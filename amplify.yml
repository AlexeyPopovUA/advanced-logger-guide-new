version: 0.1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install
        - nvm use
        - npm -v
        - node -v
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: ./public
    files:
      - '**/*'
  cache:
    paths:
      - ~/.npm
      - .cache
      - /opt/google/**/*
