version: 0.1
env:
  variables:
    GATSBY_EXPERIMENTAL_PAGE_BUILD_ON_DATA_CHANGES: true
    CI: true
frontend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm -v
        - npm ci
        - npm run clean
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: ./public
    files:
      - '**/*'
  cache:
    paths:
      - ~/.npm
      - .cache/**/*
      - public/**/*
